services:
  db:
    image: docker.io/library/postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=autotube
      - POSTGRES_PASSWORD=autotube_secret
      - POSTGRES_DB=autotube_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U autotube -d autotube_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  redis:
    image: docker.io/library/redis:7-alpine
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "80:8000"
    env_file:
      - .env
    volumes:
      - output_data:/app/core/output_v2
      - ./core/client_secrets.json:/app/core/client_secrets.json
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    command: celery -A app.worker.celery worker --loglevel=info --concurrency=1
    env_file:
      - .env
    volumes:
      - output_data:/app/core/output_v2
      - ./core/client_secrets.json:/app/core/client_secrets.json
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

volumes:
  postgres_data:
  output_data:
